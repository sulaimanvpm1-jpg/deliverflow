<!DOCTYPE html><!-- build=2026040903 -->
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%23FF5A1F'/%3E%3Cpolygon points='50,18 76,33 50,48 24,33' fill='white'/%3E%3Cpolygon points='24,33 50,48 50,82 24,67' fill='rgba(255,255,255,0.55)'/%3E%3Cpolygon points='76,33 50,48 50,82 76,67' fill='rgba(255,255,255,0.32)'/%3E%3C/svg%3E"/>
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%23FF5A1F'/%3E%3Cpolygon points='50,18 76,33 50,48 24,33' fill='white'/%3E%3Cpolygon points='24,33 50,48 50,82 24,67' fill='rgba(255,255,255,0.55)'/%3E%3Cpolygon points='76,33 50,48 50,82 76,67' fill='rgba(255,255,255,0.32)'/%3E%3C/svg%3E"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover"/>
  <title>DeliverFlow — AMTEL TELECOM</title>
  <meta name="theme-color" content="#090B10"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="DeliverFlow"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased;}
    :root{--bg:#090B10;--s1:#0F1218;--s2:#161B24;--orange:#FF5A1F;--orange2:#FF3D00;--green:#22C55E;--blue:#38BDF8;--warn:#FBBF24;--danger:#EF4444;}
    html,body{height:100%;background:var(--bg);overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;}
    #root{height:100%;width:100%;display:flex;justify-content:center;}
    #loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;z-index:9999;}
    .logo{font-size:26px;font-weight:800;letter-spacing:-0.5px;margin-bottom:6px;}
    .logo span{color:var(--orange)}
    .sub{font-size:11px;color:rgba(255,255,255,0.28);margin-bottom:32px;letter-spacing:2px;text-transform:uppercase;font-weight:500;}
    .spinner{width:32px;height:32px;border:2.5px solid rgba(255,255,255,0.08);border-top-color:var(--orange);border-radius:50%;animation:spin 0.75s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg)}}
    ::-webkit-scrollbar{width:0}
  </style>
</head>
<body>
  <div id="loading">
    <div class="logo"><span>Deliver</span>Flow</div>
    <div class="sub">AMTEL TELECOM</div>
    <div class="spinner"></div>
  </div>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <!-- Pin Babel to specific version for cross-browser consistency -->
  <script src="https://unpkg.com/@babel/standalone@7.23.10/babel.min.js"></script>

  <script>
    var JSX_URL = "https://raw.githubusercontent.com/sulaimanvpm1-jpg/deliverflow/main/deliverflow-v3.jsx";

    fetch(JSX_URL + "?t=" + Date.now())
      .then(function(res) {
        if (!res.ok) throw new Error("Fetch failed: " + res.status);
        return res.text();
      })
      .then(function(jsxCode) {
        try {
          // Strip all import statements
          var cleaned = jsxCode
            .replace(/^import\s+React[^\n]*/gm, "")
            .replace(/^import\s+\{[^}]+\}\s+from\s+['"]react['"]\s*;?/gm, "")
            .replace(/^import\s+[^\n]+from\s+['"][^'"]+['"]\s*;?/gm, "")
            .replace(/^export\s+default\s+/gm, "");

          // Inject React hooks as globals — placed on its own line before the cleaned code
          var preamble = [
            "var useState    = React.useState;",
            "var useEffect   = React.useEffect;",
            "var useRef      = React.useRef;",
            "var useCallback = React.useCallback;",
            "var useMemo     = React.useMemo;",
            "var useContext  = React.useContext;",
            "var useReducer  = React.useReducer;"
          ].join("\n");

          var source = preamble + "\n" + cleaned;

          var result = Babel.transform(source, {
            presets: [["react", { runtime: "classic" }]],
            filename: "deliverflow-v3.jsx"
          });

          var script = document.createElement("script");
          script.textContent = result.code;
          document.head.appendChild(script);

          if (!window.App) throw new Error("App component not found. Check the file compiled correctly.");

          ReactDOM.createRoot(document.getElementById("root")).render(
            React.createElement(window.App)
          );
          document.getElementById("loading").style.display = "none";

        } catch (err) {
          document.getElementById("loading").innerHTML =
            '<div style="padding:24px;color:#EF4444;font-size:13px;max-width:420px;word-break:break-word;">' +
            '<strong style="display:block;margin-bottom:8px;">App Error</strong>' +
            err.message.replace(/</g,"&lt;").replace(/>/g,"&gt;") +
            '</div>';
        }
      })
      .catch(function(err) {
        document.getElementById("loading").innerHTML =
          '<div style="padding:24px;color:#EF4444;font-size:13px;max-width:420px;">' +
          '<strong style="display:block;margin-bottom:8px;">Load Error</strong>' +
          err.message +
          '</div>';
      });
  </script>
</body>
</html>
