<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DeliverFlow — UI Design System v2</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{--orange:#FF5C1A;--orange-hot:#FF3D00;--orange-soft:#FF7A45;--orange-glow:rgba(255,92,26,0.18);--black:#0E0E0E;--black-2:#161616;--black-3:#1E1E1E;--black-4:#242424;--black-5:#2C2C2C;--white:#F5F5F0;--white-dim:rgba(245,245,240,0.65);--white-faint:rgba(245,245,240,0.18);--white-ghost:rgba(245,245,240,0.06);--gray:#9E9E9E;--success:#22C55E;--warning:#FACC15;--danger:#EF4444;--info:#38BDF8}
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0A0A0A;color:var(--white);font-family:'Space Grotesk',sans-serif;overflow-x:hidden}
.ds-header{background:linear-gradient(135deg,#0E0E0E 0%,#1a0a00 50%,#0E0E0E 100%);padding:80px 40px 60px;position:relative;overflow:hidden;border-bottom:1px solid rgba(255,92,26,0.2)}
.ds-header::before{content:'';position:absolute;top:-100px;right:-100px;width:500px;height:500px;background:radial-gradient(circle,rgba(255,92,26,0.15) 0%,transparent 70%);pointer-events:none}
.header-logo{display:flex;align-items:center;gap:16px;margin-bottom:40px}
.header-logo-text{font-family:'Bebas Neue',sans-serif;font-size:56px;letter-spacing:2px;line-height:1;color:var(--white)}
.header-logo-text span{color:var(--orange)}
.section-label{font-size:11px;letter-spacing:4px;text-transform:uppercase;color:var(--orange);font-weight:600;margin-bottom:8px}
.pill{background:var(--white-ghost);border:1px solid var(--white-faint);border-radius:100px;padding:6px 16px;font-size:12px;font-weight:500;color:var(--white-dim);letter-spacing:1px}
.pill.active{background:var(--orange-glow);border-color:var(--orange);color:var(--orange)}
.header-pills{display:flex;gap:10px;flex-wrap:wrap;margin-top:32px}
.section{padding:80px 40px;border-bottom:1px solid var(--white-ghost)}
.section-title{font-family:'Bebas Neue',sans-serif;font-size:48px;letter-spacing:2px;line-height:1.1;color:var(--white);margin-bottom:8px}
.section-sub{font-size:14px;color:var(--white-dim);margin-bottom:48px}
.palette-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:16px;margin-bottom:32px}
.swatch{border-radius:16px;overflow:hidden;border:1px solid rgba(255,255,255,0.06)}
.swatch-color{height:100px}
.swatch-info{background:var(--black-3);padding:12px 14px}
.swatch-name{font-size:13px;font-weight:600;color:var(--white);margin-bottom:2px}
.swatch-hex{font-family:'DM Mono',monospace;font-size:11px;color:var(--gray)}
.type-sample{display:flex;align-items:baseline;gap:24px;padding:20px 0;border-bottom:1px solid var(--white-ghost)}
.type-meta{width:140px;flex-shrink:0}
.type-meta-label{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--orange);font-weight:500}
.type-meta-detail{font-size:11px;color:var(--gray);font-family:'DM Mono',monospace;margin-top:4px}
.phones-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:32px}
.phone-frame{background:var(--black-2);border-radius:40px;padding:10px;border:2px solid var(--black-5);box-shadow:0 40px 80px rgba(0,0,0,0.6),0 0 0 1px rgba(255,255,255,0.04)}
.phone-notch{width:80px;height:24px;background:var(--black);border-radius:0 0 14px 14px;margin:0 auto;position:relative;z-index:10}
.phone-screen{background:#0A0A0A;border-radius:32px;overflow:hidden;min-height:580px;display:flex;flex-direction:column}
.phone-label{text-align:center;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--orange);margin-top:20px;font-weight:600}
.phone-title{text-align:center;font-size:14px;font-weight:600;color:var(--white-dim);margin-top:4px;margin-bottom:24px}
.screen-login{min-height:580px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;position:relative;overflow:hidden;background:#0A0A0A}
.screen-login::before{content:'';position:absolute;top:-120px;left:50%;transform:translateX(-50%);width:300px;height:300px;background:radial-gradient(circle,rgba(255,92,26,0.2) 0%,transparent 70%)}
.login-logo{width:72px;height:72px;background:var(--orange);border-radius:20px;display:flex;align-items:center;justify-content:center;margin-bottom:16px;position:relative;box-shadow:0 0 40px rgba(255,92,26,0.4)}
.login-brand{font-family:'Bebas Neue',sans-serif;font-size:38px;letter-spacing:2px;color:var(--white);margin-bottom:4px}
.login-brand span{color:var(--orange)}
.login-sub{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--gray);margin-bottom:36px}
.input-group{width:100%;margin-bottom:12px}
.input-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--gray);margin-bottom:6px;display:block}
.input-field{width:100%;background:var(--black-3);border:1.5px solid var(--black-5);border-radius:12px;padding:13px 16px;font-size:14px;font-family:'Space Grotesk',sans-serif;color:var(--white);display:flex;align-items:center;gap:10px}
.input-field.focused{border-color:var(--orange);background:rgba(255,92,26,0.06)}
.input-placeholder{color:var(--gray);font-size:14px}
.input-value{color:var(--white);font-size:14px;font-weight:500}
.btn-primary{width:100%;background:var(--orange);border:none;border-radius:14px;padding:16px;font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px;color:#fff;cursor:pointer;margin-top:8px;position:relative;overflow:hidden;box-shadow:0 8px 24px rgba(255,92,26,0.4);display:flex;align-items:center;justify-content:center;gap:10px}
.btn-primary::after{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:rgba(255,255,255,0.1);border-radius:14px 14px 0 0}
.login-footer{font-size:11px;color:var(--gray);margin-top:20px;letter-spacing:0.5px}
.screen-driver{background:#0A0A0A;min-height:580px;display:flex;flex-direction:column}
.driver-header{padding:16px 18px 12px;background:linear-gradient(180deg,#141414 0%,#0A0A0A 100%);border-bottom:1px solid var(--white-ghost)}
.driver-header-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.driver-greeting{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--gray)}
.driver-name{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:1px;color:var(--white);line-height:1;display:flex;align-items:center;gap:8px}
.status-badge{background:rgba(34,197,94,0.15);border:1px solid rgba(34,197,94,0.35);border-radius:100px;padding:4px 10px;font-size:10px;font-weight:600;color:var(--success);display:flex;align-items:center;gap:5px;letter-spacing:1px}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--success);animation:pulse-green 2s infinite}
@keyframes pulse-green{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.6;transform:scale(1.3)}}
.progress-card{background:var(--black-3);border-radius:14px;padding:14px;margin:12px 18px;border:1px solid var(--black-5);display:flex;align-items:center;gap:14px}
.progress-ring-wrap{position:relative;width:54px;height:54px;flex-shrink:0}
.progress-ring-wrap svg{transform:rotate(-90deg)}
.progress-center-text{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--orange)}
.progress-info{flex:1}
.progress-label{font-size:11px;color:var(--gray);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
.progress-nums{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--white);line-height:1;margin-bottom:2px}
.progress-sub{font-size:11px;color:var(--gray)}
.orders-list{flex:1;overflow:hidden;padding:0 18px 80px}
.orders-label{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--orange);margin:12px 0 10px;font-weight:600;display:flex;align-items:center;gap:6px}
.order-card{background:var(--black-3);border-radius:14px;padding:13px 14px;margin-bottom:8px;border:1px solid var(--black-5);display:flex;justify-content:space-between;align-items:flex-start}
.order-card.collected{border-color:rgba(255,92,26,0.3);background:rgba(255,92,26,0.04)}
.order-card.delivered{border-color:rgba(34,197,94,0.25);background:rgba(34,197,94,0.03)}
.order-store-dot{width:8px;height:8px;border-radius:50%;margin-top:4px;margin-right:8px;flex-shrink:0}
.order-customer{font-size:14px;font-weight:600;color:var(--white)}
.order-meta{font-size:11px;color:var(--gray);margin-top:2px}
.order-area-tag{display:inline-flex;align-items:center;gap:3px;background:rgba(56,189,248,0.12);border:1px solid rgba(56,189,248,0.25);border-radius:100px;padding:2px 8px;font-size:10px;color:var(--info);font-weight:500;margin-top:4px}
.order-amount{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--orange);text-align:right}
.order-payment-badge{display:inline-block;border-radius:100px;padding:2px 8px;font-size:9px;font-weight:700;margin-top:3px}
.pay-cash{background:#10B981;color:#fff}
.pay-tabby{background:#3DEBA0;color:#111}
.bottom-nav{position:sticky;bottom:0;background:var(--black-2);border-top:1px solid var(--black-5);display:flex;padding:10px 4px 8px}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer}
.nav-label{font-size:9px;font-weight:500;color:var(--gray);letter-spacing:0.5px;text-transform:uppercase}
.nav-item.active .nav-label{color:var(--orange)}
.nav-active-dot{width:4px;height:4px;border-radius:50%;background:var(--orange);margin:0 auto}
.scan-header{padding:14px 18px;display:flex;align-items:center;gap:12px;background:var(--black-2);border-bottom:1px solid var(--white-ghost)}
.scan-back{width:32px;height:32px;background:var(--black-4);border-radius:10px;display:flex;align-items:center;justify-content:center}
.scan-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;color:var(--white)}
.scan-camera-area{background:#000;height:220px;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden}
.scan-overlay{position:absolute;inset:0;background:linear-gradient(rgba(0,0,0,0.5) 0%,transparent 30%,transparent 70%,rgba(0,0,0,0.5) 100%)}
.scan-frame{width:160px;height:120px;position:relative;z-index:2}
.scan-corner{position:absolute;width:22px;height:22px}
.scan-corner.tl{top:0;left:0;border-top:3px solid var(--orange);border-left:3px solid var(--orange);border-radius:4px 0 0 0}
.scan-corner.tr{top:0;right:0;border-top:3px solid var(--orange);border-right:3px solid var(--orange);border-radius:0 4px 0 0}
.scan-corner.bl{bottom:0;left:0;border-bottom:3px solid var(--orange);border-left:3px solid var(--orange);border-radius:0 0 0 4px}
.scan-corner.br{bottom:0;right:0;border-bottom:3px solid var(--orange);border-right:3px solid var(--orange);border-radius:0 0 4px 0}
.scan-line{position:absolute;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--orange),transparent);top:40%;animation:scan-anim 1.5s ease-in-out infinite alternate;z-index:3}
@keyframes scan-anim{from{top:10%}to{top:80%}}
.scan-hint{position:absolute;bottom:14px;left:0;right:0;text-align:center;font-size:11px;color:rgba(255,255,255,0.5);letter-spacing:1px;z-index:4}
.scan-result-found{margin:14px 18px;background:rgba(255,92,26,0.08);border:1.5px solid rgba(255,92,26,0.4);border-radius:16px;padding:14px}
.scan-result-tag{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--orange);font-weight:600;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.scan-result-name{font-size:16px;font-weight:700;color:var(--white);margin-bottom:2px}
.scan-result-info{font-size:12px;color:var(--gray);margin-bottom:4px;display:flex;align-items:center;gap:4px}
.scan-result-amount{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--orange)}
.btn-confirm{width:100%;background:linear-gradient(135deg,var(--orange) 0%,var(--orange-hot) 100%);border:none;border-radius:12px;padding:14px;font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;color:#fff;box-shadow:0 6px 20px rgba(255,92,26,0.35);margin-top:10px;display:flex;align-items:center;justify-content:center;gap:8px}
.scan-manual{margin:10px 18px 0;display:flex;gap:8px}
.scan-input{flex:1;background:var(--black-3);border:1.5px solid var(--black-5);border-radius:10px;padding:10px 12px;font-size:13px;color:var(--gray);font-family:'Space Grotesk';display:flex;align-items:center}
.scan-go{background:var(--orange);border:none;border-radius:10px;padding:0 16px;font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px;color:#fff}
.modal-sheet{background:#141414;border-radius:24px 24px 0 0;padding:24px 20px 28px;flex:1;border-top:1px solid var(--black-5)}
.modal-handle{width:36px;height:4px;background:var(--black-5);border-radius:100px;margin:0 auto 20px}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:1px;color:var(--white);margin-bottom:4px}
.modal-invoice{font-size:12px;color:var(--gray);font-family:'DM Mono',monospace;margin-bottom:20px}
.status-option{border-radius:14px;padding:14px 16px;margin-bottom:10px;border:1.5px solid transparent;cursor:pointer;display:flex;align-items:center;gap:12px}
.status-option.delivered{background:rgba(34,197,94,0.08);border-color:rgba(34,197,94,0.3)}
.status-option.postponed{background:rgba(250,204,21,0.06);border-color:rgba(250,204,21,0.25)}
.status-option.cancelled{background:rgba(239,68,68,0.06);border-color:rgba(239,68,68,0.25)}
.status-option-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.status-delivered-icon{background:rgba(34,197,94,0.15)}
.status-postponed-icon{background:rgba(250,204,21,0.12)}
.status-cancelled-icon{background:rgba(239,68,68,0.1)}
.status-option-label{font-size:15px;font-weight:600;color:var(--white)}
.status-option-desc{font-size:11px;color:var(--gray);margin-top:2px}
.payment-row{background:var(--black-3);border-radius:12px;padding:14px;margin-top:14px;border:1px solid var(--black-5)}
.payment-row-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--orange);font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.payment-options{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.payment-opt{background:var(--black-4);border-radius:10px;padding:10px 8px;text-align:center;font-size:11px;font-weight:600;color:var(--gray);border:1.5px solid var(--black-5)}
.payment-opt.sel{background:rgba(255,92,26,0.1);border-color:var(--orange);color:var(--orange)}
.admin-tabs{display:flex;background:#111;border-bottom:1px solid var(--black-5)}
.admin-tab{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 0 7px;gap:2px}
.admin-tab-label{font-size:9px;text-transform:uppercase;letter-spacing:0.5px;color:var(--gray);font-weight:500}
.admin-tab.active .admin-tab-label{color:var(--orange)}
.admin-tab-indicator{width:4px;height:4px;border-radius:50%;background:var(--orange)}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.stat-card{background:var(--black-3);border-radius:12px;padding:10px 8px;text-align:center;border:1px solid var(--black-5)}
.stat-card-num{font-family:'Bebas Neue',sans-serif;font-size:22px;line-height:1}
.stat-card-label{font-size:9px;color:var(--gray);text-transform:uppercase;letter-spacing:0.5px;margin-top:2px}
.driver-perf-card{background:var(--black-3);border-radius:14px;padding:13px 14px;border:1px solid var(--black-5);margin-bottom:10px;display:flex;align-items:center;gap:12px}
.driver-avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--orange),var(--orange-hot));display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:16px;color:#fff;flex-shrink:0}
.driver-perf-info{flex:1}
.driver-perf-name{font-size:15px;font-weight:600;color:var(--white)}
.driver-perf-orders{font-size:11px;color:var(--gray);display:flex;align-items:center;gap:4px}
.driver-perf-nums{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--success)}
.driver-perf-sub{font-size:10px;color:var(--gray)}
.mini-progress{height:4px;border-radius:100px;background:var(--black-5);margin-top:8px;overflow:hidden}
.mini-progress-fill{height:100%;background:linear-gradient(90deg,var(--orange),var(--orange-soft));border-radius:100px}
.driver-chip{display:flex;align-items:center;gap:5px;background:var(--black-3);border:1px solid var(--black-5);border-radius:100px;padding:4px 10px;flex-shrink:0}
.driver-chip-dot{width:7px;height:7px;border-radius:50%}
.driver-chip-name{font-size:11px;font-weight:600;color:var(--gray)}
.driver-chip.online .driver-chip-dot{background:var(--success);box-shadow:0 0 6px var(--success)}
.driver-chip.online .driver-chip-name{color:var(--success)}
.components-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:24px}
.component-box{background:var(--black-2);border-radius:20px;padding:28px;border:1px solid var(--black-4)}
.comp-label{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--orange);font-weight:600;margin-bottom:20px}
.btn-showcase{display:flex;flex-direction:column;gap:10px}
.btn-s{padding:13px 20px;border-radius:12px;font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px;border:none;cursor:pointer;display:flex;align-items:center;gap:10px}
.btn-s.primary{background:var(--orange);color:#fff;box-shadow:0 6px 20px rgba(255,92,26,0.3)}
.btn-s.secondary{background:var(--black-4);color:var(--white);border:1px solid var(--black-5)}
.btn-s.danger{background:rgba(239,68,68,0.12);color:#EF4444;border:1px solid rgba(239,68,68,0.3)}
.btn-s.success-btn{background:rgba(34,197,94,0.12);color:var(--success);border:1px solid rgba(34,197,94,0.3)}
.btn-s.ghost{background:transparent;color:var(--orange);border:1.5px solid var(--orange)}
.badges-showcase{display:flex;flex-wrap:wrap;gap:8px}
.badge{display:inline-flex;align-items:center;gap:6px;border-radius:100px;padding:5px 12px;font-size:11px;font-weight:600;border:1px solid}
.badge-pending{background:rgba(250,204,21,0.1);color:#FACC15;border-color:rgba(250,204,21,0.3)}
.badge-collected{background:rgba(56,189,248,0.1);color:var(--info);border-color:rgba(56,189,248,0.3)}
.badge-delivered{background:rgba(34,197,94,0.1);color:var(--success);border-color:rgba(34,197,94,0.3)}
.badge-cancelled{background:rgba(239,68,68,0.1);color:#EF4444;border-color:rgba(239,68,68,0.3)}
.badge-postponed{background:rgba(168,85,247,0.1);color:#A855F7;border-color:rgba(168,85,247,0.3)}
.badge-exchange{background:rgba(107,114,128,0.15);color:#9CA3AF;border-color:rgba(107,114,128,0.3)}
.pay-badges{display:flex;flex-wrap:wrap;gap:6px}
.pay-badge{border-radius:100px;padding:4px 10px;font-size:10px;font-weight:700;letter-spacing:0.5px}
.input-showcase{display:flex;flex-direction:column;gap:12px}
.input-demo{width:100%;background:var(--black-3);border:1.5px solid var(--black-5);border-radius:12px;padding:12px 16px;font-size:13px;font-family:'Space Grotesk';color:var(--white);display:flex;align-items:center;gap:10px}
.input-demo.active-demo{border-color:var(--orange);background:rgba(255,92,26,0.05)}
.input-demo.error-demo{border-color:#EF4444;background:rgba(239,68,68,0.04)}
.card-variants{display:flex;flex-direction:column;gap:10px}
.card-v{background:var(--black-3);border-radius:14px;padding:14px;border:1px solid var(--black-5)}
.card-v.accent{border-color:rgba(255,92,26,0.3);background:rgba(255,92,26,0.04)}
.card-v.card-success{border-color:rgba(34,197,94,0.25);background:rgba(34,197,94,0.03)}
.card-v-title{font-size:14px;font-weight:600;color:var(--white);margin-bottom:3px}
.card-v-sub{font-size:11px;color:var(--gray)}
.icon-showcase-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}
.icon-tile{aspect-ratio:1;background:var(--black-4);border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;border:1px solid var(--black-5);padding:10px;cursor:default;transition:border-color 0.2s,background 0.2s}
.icon-tile:hover{border-color:rgba(255,92,26,0.4);background:rgba(255,92,26,0.06)}
.icon-tile svg{width:32px;height:32px}
.icon-tile-label{font-size:8px;color:var(--gray);text-transform:uppercase;letter-spacing:0.5px;text-align:center}
.motion-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:16px}
.motion-card{background:var(--black-3);border-radius:16px;padding:24px 16px;text-align:center;border:1px solid var(--black-5)}
.motion-card-label{font-size:11px;color:var(--gray);text-transform:uppercase;letter-spacing:1px;margin-top:12px}
@keyframes pulse-icon{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.15);opacity:0.8}}
@keyframes spin-icon{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes bounce-icon{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
@keyframes progress-anim{from{width:20%}to{width:90%}}
.spacing-row{display:flex;align-items:flex-end;gap:12px;flex-wrap:wrap}
.spacing-item{display:flex;flex-direction:column;align-items:center;gap:8px}
.spacing-box{background:var(--orange);border-radius:4px;width:24px}
.spacing-label{font-size:9px;color:var(--gray);font-family:'DM Mono';letter-spacing:0.5px;text-transform:uppercase}
.radius-box{width:60px;height:60px;background:var(--black-4);border:2px solid var(--orange);display:flex;align-items:center;justify-content:center;font-size:10px;font-family:'DM Mono';color:var(--gray)}
.divider{height:1px;background:var(--black-5);margin:16px 0}
.deploy-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px}
.deploy-card{background:var(--black-2);border-radius:20px;padding:28px;border:1px solid var(--black-4)}
.deploy-card.highlight{border-color:rgba(255,92,26,0.4);background:rgba(255,92,26,0.03)}
.deploy-step-num{font-family:'Bebas Neue',sans-serif;font-size:64px;color:rgba(255,92,26,0.2);line-height:1;margin-bottom:8px}
.deploy-title{font-size:16px;font-weight:700;color:var(--white);margin-bottom:8px;display:flex;align-items:center;gap:8px}
.deploy-body{font-size:13px;color:var(--gray);line-height:1.7}
.code-block{background:#0A0A0A;border:1px solid var(--black-5);border-radius:10px;padding:12px 14px;margin-top:12px;font-family:'DM Mono',monospace;font-size:12px;color:#FF7A45;line-height:1.8}
.code-comment{color:var(--gray)}
.deploy-tip{background:rgba(34,197,94,0.08);border:1px solid rgba(34,197,94,0.25);border-radius:10px;padding:10px 14px;margin-top:12px;font-size:12px;color:var(--success);line-height:1.6;display:flex;gap:8px;align-items:flex-start}
.deploy-warn{background:rgba(250,204,21,0.07);border:1px solid rgba(250,204,21,0.25);border-radius:10px;padding:10px 14px;margin-top:12px;font-size:12px;color:var(--warning);line-height:1.6;display:flex;gap:8px;align-items:flex-start}
.revert-steps{counter-reset:revert-counter;list-style:none;display:flex;flex-direction:column;gap:14px}
.revert-steps li{counter-increment:revert-counter;display:flex;gap:14px;align-items:flex-start}
.revert-num{background:var(--orange);color:#fff;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;margin-top:1px}
.version-banner{background:linear-gradient(135deg,rgba(255,92,26,0.15),rgba(255,92,26,0.05));border:1px solid rgba(255,92,26,0.3);border-radius:14px;padding:14px 20px;margin-bottom:40px;display:flex;align-items:center;gap:12px}
.version-banner-dot{width:10px;height:10px;border-radius:50%;background:var(--orange);animation:pulse-icon 1.5s ease-in-out infinite;flex-shrink:0}
.ds-footer{padding:60px 40px;border-top:1px solid rgba(255,92,26,0.2);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:20px}
.footer-brand{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:2px;color:var(--white)}
.footer-brand span{color:var(--orange)}
</style>
</head>
