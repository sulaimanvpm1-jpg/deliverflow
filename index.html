<!DOCTYPE html><!-- build=2026040701 -->
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%23FF7A45'/%3E%3Cpolygon points='50,18 76,33 50,48 24,33' fill='white'/%3E%3Cpolygon points='24,33 50,48 50,82 24,67' fill='rgba(255,255,255,0.55)'/%3E%3Cpolygon points='76,33 50,48 50,82 76,67' fill='rgba(255,255,255,0.32)'/%3E%3C/svg%3E"/>
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%23FF7A45'/%3E%3Cpolygon points='50,18 76,33 50,48 24,33' fill='white'/%3E%3Cpolygon points='24,33 50,48 50,82 24,67' fill='rgba(255,255,255,0.55)'/%3E%3Cpolygon points='76,33 50,48 50,82 76,67' fill='rgba(255,255,255,0.32)'/%3E%3C/svg%3E"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover"/>
  <title>DeliverFlow - AMTEL TELECOM</title>
  <meta name="theme-color" content="#0D0D0D"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="DeliverFlow"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{height:100%;background:#0D0D0D;overflow:hidden;font-family:'Geist',system-ui,sans-serif}
    #root{height:100%;width:100%;display:flex;justify-content:center}
    #loading{position:fixed;inset:0;background:#0D0D0D;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Geist',system-ui,sans-serif;color:#fff;z-index:9999}
    .logo{font-size:26px;font-weight:900;letter-spacing:2px;margin-bottom:8px;font-family:'Geist',system-ui,sans-serif}
    .logo span{color:#FF6B2B}
    .sub{font-size:11px;color:rgba(255,255,255,0.25);margin-bottom:32px;letter-spacing:2px;text-transform:uppercase;font-family:'Geist',system-ui,sans-serif}
    .spinner{width:36px;height:36px;border:3px solid rgba(255,255,255,0.08);border-top-color:#FF6B2B;border-radius:50%;animation:spin 0.8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <div id="loading">
    <div class="logo"><span>DELIVER</span>FLOW</div>
    <div class="sub">AMTEL TELECOM</div>
    <div class="spinner"></div>
  </div>
  <div id="root"></div>

  <!-- React -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <!-- Babel standalone to compile JSX on the fly -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script>
    // ── Load the JSX from your GitHub repo and compile it with Babel ──────────
    // IMPORTANT: Replace this URL with your actual GitHub raw file URL.
    // Format: https://raw.githubusercontent.com/YOUR_USERNAME/YOUR_REPO/main/deliverflow-v3.jsx
    var JSX_URL = "https://raw.githubusercontent.com/YOUR_USERNAME/YOUR_REPO/main/deliverflow-v3.jsx";

    fetch(JSX_URL + "?t=" + Date.now()) // cache-bust so latest version always loads
      .then(function(res) {
        if (!res.ok) throw new Error("Failed to fetch JSX: " + res.status);
        return res.text();
      })
      .then(function(jsxCode) {
        try {
          // Compile JSX → plain JS using Babel
          var compiled = Babel.transform(jsxCode, {
            presets: ["react"],
            plugins: []
          }).code;

          // Execute the compiled code
          var script = document.createElement("script");
          script.textContent = compiled;
          document.head.appendChild(script);

          // Mount the app
          if (!window.App) throw new Error("App not defined after load");
          ReactDOM.createRoot(document.getElementById("root")).render(
            React.createElement(window.App)
          );
          document.getElementById("loading").style.display = "none";
        } catch(e) {
          document.getElementById("loading").innerHTML =
            '<div style="padding:24px;color:#EF4444;font-size:13px;word-break:break-all;max-width:400px">' +
            '<strong>App Error:</strong><br>' + e.message + '</div>';
        }
      })
      .catch(function(e) {
        document.getElementById("loading").innerHTML =
          '<div style="padding:24px;color:#EF4444;font-size:13px;word-break:break-all;max-width:400px">' +
          '<strong>Load Error:</strong><br>' + e.message +
          '<br><br>Check that your GitHub URL is correct and the file is public.' +
          '</div>';
      });
  </script>
</body>
</html>
