<head>

  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%23FF7A45'/%3E%3Cpolygon points='50,18 76,33 50,48 24,33' fill='white'/%3E%3Cpolygon points='24,33 50,48 50,82 24,67' fill='rgba(255,255,255,0.55)'/%3E%3Cpolygon points='76,33 50,48 50,82 76,67' fill='rgba(255,255,255,0.32)'/%3E%3C/svg%3E"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover"/>
  <title>DeliverFlow - AMTEL TELECOM</title>
  <meta name="theme-color" content="#0A0F1E"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap">

  <style>
    /* CSS variables control all fonts in the app */
    :root {
      --font-head: 'Syne', system-ui, sans-serif;
      --font-body: 'DM Sans', system-ui, sans-serif;
    }
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{height:100%;background:#0A0F1E;overflow:hidden;font-family:var(--font-body);}
    #root{height:100%;width:100%;display:flex;justify-content:center}
    #loading{position:fixed;inset:0;background:#0A0F1E;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;z-index:9999;}
    .logo{font-family:var(--font-head);font-size:28px;font-weight:800;letter-spacing:-0.5px;margin-bottom:8px;}
    .logo span{color:#FF6B35}
    .sub{font-family:var(--font-body);font-size:11px;color:rgba(255,255,255,0.3);margin-bottom:32px;letter-spacing:2px;text-transform:uppercase;}
    .spinner{width:36px;height:36px;border:3px solid rgba(255,255,255,0.08);border-top-color:#FF6B35;border-radius:50%;animation:spin 0.8s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg)}}
    ::-webkit-scrollbar{width:0}
  </style>
</head>
<body>
  <div id="loading">
    <div class="logo"><span>Deliver</span>Flow</div>
    <div class="sub">AMTEL TELECOM</div>
    <div class="spinner"></div>
  </div>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script>
    var JSX_URL = "https://raw.githubusercontent.com/sulaimanvpm1-jpg/deliverflow/main/deliverflow-v3.jsx";

    fetch(JSX_URL + "?t=" + Date.now())
      .then(function(res) {
        if (!res.ok) throw new Error("Failed to fetch JSX: " + res.status);
        return res.text();
      })
      .then(function(jsxCode) {
        try {
          var cleaned = jsxCode
            .replace(/^import\s+React[^\n]*/gm, "")
            .replace(/^import\s+\{[^}]+\}\s+from\s+['"]react['"]\s*;?/gm, "")
            .replace(/^import\s+[^\n]+from\s+['"][^'"]+['"]\s*;?/gm, "");

          var preamble = [
            "var useState    = React.useState;",
            "var useEffect   = React.useEffect;",
            "var useRef      = React.useRef;",
            "var useCallback = React.useCallback;",
            "var useMemo     = React.useMemo;",
            "var useContext  = React.useContext;",
            "var useReducer  = React.useReducer;",
          ].join("\n");

          var compiled = Babel.transform(preamble + "\n" + cleaned, {
            presets: ["react"],
          }).code;

          var script = document.createElement("script");
          script.textContent = compiled;
          document.head.appendChild(script);

          if (!window.App) throw new Error("App not defined after load");

          ReactDOM.createRoot(document.getElementById("root")).render(
            React.createElement(window.App)
          );
          document.getElementById("loading").style.display = "none";

        } catch(e) {
          document.getElementById("loading").innerHTML =
            '<div style="padding:24px;color:#EF4444;font-size:13px;word-break:break-all;max-width:400px">' +
            '<strong>App Error:</strong><br>' + e.message + '</div>';
        }
      })
      .catch(function(e) {
        document.getElementById("loading").innerHTML =
          '<div style="padding:24px;color:#EF4444;font-size:13px;word-break:break-all;max-width:400px">' +
          '<strong>Load Error:</strong><br>' + e.message +
          '<br><br>Check your GitHub URL is correct and the file is public.</div>';
      });
  </script>
</body>
</html>
