window._dfSaveCivilID = async function(record) {
  if (window.getSupabase) {
    var sb = window.getSupabase();
    if (sb) {
      sb.from("civil_id_records").upsert({
        invoice_no: record.invoiceNo,
        online_order_no: record.onlineOrderNo || "",
        civil_id_number: record.civilIdNumber,
        full_name: record.fullName,
        driver_name: record.driverName,
        delivered_date: record.deliveredDate,
        created_at: new Date().toISOString()
      }, { onConflict: "invoice_no" })
      .then(function(){}, function(e){ console.warn("Civil ID save:", e.message); });
    }
  }
  try {
    var stored = JSON.parse(localStorage.getItem("df_civil_ids") || "[]");
    var next = stored.filter(function(r){ return r.invoiceNo !== record.invoiceNo; });
    next.push(record);
    localStorage.setItem("df_civil_ids", JSON.stringify(next));
  } catch(e) {}

window._dfLoadCivilIDs = async function() {
  if (window.getSupabase) {
    var sb = window.getSupabase();
    if (sb) {
      try {
        var res = await sb.from("civil_id_records").select("*").order("created_at", { ascending: false });

              onlineOrderNo: r.online_order_no || "",
              civilIdNumber: r.civil_id_number,

              driverName: r.driver_name,
              deliveredDate: r.delivered_date,
              createdAt: r.created_at
            };

        }
      } catch(e) { console.warn("Supabase civil_id load:", e); }
    }
  }
  try { return JSON.parse(localStorage.getItem("df_civil_ids") || "[]"); }
  catch(e) { return []; }
};

window._dfExtractCivilID = async function(base64Image, mediaType) {
  var response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 300,
      messages: [{
        role: "user",
        content: [
          {
            type: "image",
            source: { type: "base64", media_type: mediaType || "image/jpeg", data: base64Image }
          },
          {
            type: "text",
            text: "This is a State of Kuwait Civil ID card. Extract ONLY these two fields and respond with ONLY valid JSON (no markdown fences, no extra text):\n{\"civil_id_number\": \"the 12-digit number next to the Civil ID No label at the top right\", \"full_name\": \"the English name after the word Name in the middle-left, written in ALL CAPS\"}\nIf a field is unreadable use empty string \"\"."
          }
        ]
      }]
    })
  });
  var data = await response.json();
  var text = (data.content || []).map(function(c){ return c.text || ""; }).join("").trim();
  return JSON.parse(text.replace(/```json|```/g, "").trim());
};
